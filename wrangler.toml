name = "event"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_VERSION = "20.18.0"
NPM_CONFIG_LEGACY_PEER_DEPS = "true"

[pages]
# These settings will be applied once Cloudflare processes the wrangler configuration (Beta)
# However, many times Cloudflare still prefers the dashboard.
# We include these for robustness.
build_command = "npm install && npm run pages:build"
output_dir = ".vercel/output"
